<!doctype html>
<html lang="ko">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>분석기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      // 기존 분석기 SPA는 "/" 경로에서만 렌더링되므로 브라우저 주소를 "/analyzer" 그대로 두되
      // 라우터가 "/"로 인식하도록 히스토리 상태를 교체한다.
      if (window.location.pathname !== "/") {
        window.history.replaceState({}, "", "/");
      }
    </script>
    <script type="module" crossorigin src="/assets/index-ByWu2BpN.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DVPuzOoH.css">
    
  </head>

  <body>
    

    <div id="root"></div>
    <button
      id="analyzer-logout-btn"
      style="position:fixed;bottom:16px;right:16px;z-index:99999;background:#dc2626;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);font-family:'Noto Sans KR',sans-serif;">
      로그아웃
    </button>
    <div
      id="feed-freshness"
      style="position:fixed;bottom:16px;left:16px;z-index:99998;background:rgba(20,20,50,.85);color:#9ca3af;border:1px solid #33336a;border-radius:8px;padding:6px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;line-height:1.5;">
      데이터 상태 확인 중...
    </div>
    <div
      id="feed-alert"
      style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#b91c1c;color:#fff;text-align:center;padding:8px 16px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.5);">
    </div>
    <script>
      document.getElementById("analyzer-logout-btn").addEventListener("click", async function () {
        try {
          await fetch("/api/trpc/analyzerAuth.logout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ json: null }),
            credentials: "include",
          });
        } catch (e) {}
        window.location.href = "/login";
      });

      // 데이터 신선도 표시 + 장애 경고 배너
      (function () {
        // ===== Phocoa API 2 메뉴 =====
        // 기존 번들의 fetch 요청을 가로채 /api/phocoa/3matrix4 → /api/phocoa2/3matrix4 로
        // 전환하는 방식으로, 번들 수정 없이 Phocoa API 2 모드를 제공한다.
        var PHOCOA2_KEY = "use_phocoa2";
        var usePhocoa2 = sessionStorage.getItem(PHOCOA2_KEY) === "1";
        // CSS 클래스 기반 스타일: React 리렌더/inline 스타일과 충돌하지 않으며
        // 모드 해제 시 클래스만 제거하면 자동으로 원래 색으로 복원된다.
        var p2Style = document.createElement("style");
        p2Style.textContent =
          "body.p2-on button.p2-phocoa, body.p2-on button.p2-phocoa:hover{background:#374151 !important;background-color:#374151 !important;background-image:none !important;color:#9ca3af !important;}" +
          "body.p2-on button.p2-sol, body.p2-on button.p2-sol:hover{background:#7c3aed !important;background-color:#7c3aed !important;background-image:none !important;color:#ffffff !important;}";
        document.head.appendChild(p2Style);
        function syncP2Class() {
          document.body.classList.toggle("p2-on", usePhocoa2);
        }
        syncP2Class();
        var rewriteFetch = window.fetch.bind(window);
        window.fetch = async function (input, init) {
          try {
            var url = typeof input === "string" ? input : (input && input.url) || "";
            if (usePhocoa2 && url.indexOf("/api/phocoa/3matrix4") !== -1) {
              var newUrl = url.replace("/api/phocoa/3matrix4", "/api/phocoa2/3matrix4");
              input = typeof input === "string" ? newUrl : new Request(newUrl, input);
            }
          } catch (e) {}
          var res = await rewriteFetch(input, init);
          // phocoa2 응답에서 예측 구간 정보 수집 (predicted_from)
          try {
            var u2 = typeof input === "string" ? input : (input && input.url) || "";
            if ((u2.indexOf("/api/phocoa2/3matrix4") !== -1 || (usePhocoa2 && u2.indexOf("/api/phocoa") !== -1)) && res.ok) {
              res.clone().json().then(function (rooms) {
                if (!Array.isArray(rooms)) return;
                window.__p2Predictions = {};
                for (var pi = 0; pi < rooms.length; pi++) {
                  var rm = rooms[pi];
                  if (rm.predicted) {
                    window.__p2Predictions[String(rm.table_nm)] = {
                      from: rm.predicted_from,
                      total: rm.cnt,
                    };
                  }
                }
              }).catch(function () {});
            }
          } catch (e) {}
          return res;
        };
        // Phocoa API 2 토글 버튼 주입 (기존 "Phocoa API" 버튼 옆)
        function setPhocoa2Mode(on) {
          usePhocoa2 = on;
          sessionStorage.setItem(PHOCOA2_KEY, on ? "1" : "0");
          syncP2Class();
        }
        // 최신 Phocoa API 버튼을 매번 새로 조회 (리렌더로 stale된 참조 방지)
        function findPhocoaBtn() {
          var bs = document.querySelectorAll("button");
          for (var i = 0; i < bs.length; i++) {
            var t = bs[i].textContent || "";
            if (t.indexOf("Phocoa API") !== -1 && t.indexOf("solsystem") === -1) return bs[i];
          }
          return null;
        }
        // React 위임 리스너에 확실히 전달되도록 pointer/mouse 이벤트 시퀀스로 클릭 시뮬레이션
        function simulateClick(el) {
          if (!el) return;
          try { el.focus(); } catch (e) {}
          var opts = { bubbles: true, cancelable: true, button: 0 };
          try {
            el.dispatchEvent(new PointerEvent("pointerdown", Object.assign({ pointerType: "mouse" }, opts)));
            el.dispatchEvent(new MouseEvent("mousedown", opts));
            el.dispatchEvent(new PointerEvent("pointerup", Object.assign({ pointerType: "mouse" }, opts)));
            el.dispatchEvent(new MouseEvent("mouseup", opts));
            el.dispatchEvent(new MouseEvent("click", opts));
          } catch (e) {
            el.click();
          }
        }
        // Phocoa 탭 진입 보장: 최대 maxTries회, 매회 최신 버튼 재조회 + 이벤트 시퀀스
        function ensurePhocoaTab(tries) {
          if (!usePhocoa2) return; // 사용자가 모드를 껐으면 중단
          var onTab = false;
          var bs = document.querySelectorAll("button");
          for (var i = 0; i < bs.length; i++) {
            if ((bs[i].textContent || "").indexOf("스피드") === 0) { onTab = true; break; }
          }
          if (onTab) return; // 진입 완료
          if (tries <= 0) return;
          var pb = findPhocoaBtn();
          if (pb) {
            simulateClick(pb);
            // 훅이 모드를 껐다면 다시 켠다
            setTimeout(function () { if (!usePhocoa2) setPhocoa2Mode(true); }, 30);
          }
          setTimeout(function () { ensurePhocoaTab(tries - 1); }, 800);
        }
        function injectP2Button() {
          var buttons = document.querySelectorAll("button");
          var phocoaBtn = null;
          var exists = false;
          var p2Btn = null;
          for (var i = 0; i < buttons.length; i++) {
            var txt = buttons[i].textContent || "";
            if (txt.indexOf("solsystem") !== -1) { exists = true; p2Btn = buttons[i]; }
            else if (txt.indexOf("Phocoa API") !== -1) phocoaBtn = buttons[i];
          }
          // 클래스 태깅 + 다른 메뉴 클릭 시 solsystem 모드 자동 해제 훅
          if (phocoaBtn) {
            // React가 버튼을 재생성해도 매 mutation마다 클래스/훅 재적용
            phocoaBtn.classList.add("p2-phocoa");
            phocoaBtn.classList.remove("p2-sol"); // 잘못 섞인 클래스 정리
            if (!phocoaBtn.dataset.p2Hook) {
              phocoaBtn.dataset.p2Hook = "1";
              phocoaBtn.addEventListener("click", function () {
                // 사용자가 Phocoa API를 직접 클릭 → 일반 Phocoa 모드로 복귀
                if (usePhocoa2) setPhocoa2Mode(false);
              });
            }
          }
          if (p2Btn) {
            p2Btn.classList.add("p2-sol");
            p2Btn.classList.remove("p2-phocoa"); // solsystem 버튼에 섞인 phocoa 클래스 제거
          }
          // 에볼루션/수동입력 클릭 시에도 모드 해제
          for (var j = 0; j < buttons.length; j++) {
            var t = buttons[j].textContent || "";
            if ((t.indexOf("CasinoScores") !== -1 || t.indexOf("수동 입력") !== -1) && !buttons[j].dataset.p2Hook) {
              buttons[j].dataset.p2Hook = "1";
              buttons[j].addEventListener("click", function () {
                if (usePhocoa2) setPhocoa2Mode(false);
              });
            }
          }
          if (exists || !phocoaBtn) return;
          var btn = document.createElement("button");
          btn.textContent = "🗄️ solsystem";
          btn.className = phocoaBtn.className + " p2-sol";
          btn.addEventListener("click", function () {
            // 새로고침 없이 즉시 전환: 플래그만 바꾸면 다음 폴링(2초)부터
            // /api/phocoa2 데이터가 기존 화면 갱신 로직으로 그대로 표시된다.
            if (usePhocoa2) return; // 이미 solsystem 모드면 유지
            setPhocoa2Mode(true);
            // Phocoa 탭 진입은 다음 틱에서 (중첩 discrete 이벤트 배칭 회피),
            // 최신 버튼 재조회 + pointer 이벤트 시퀀스 + 최대 4회 재시도로 보장
            setTimeout(function () { ensurePhocoaTab(4); }, 0);
          });
          phocoaBtn.parentNode.insertBefore(btn, phocoaBtn.nextSibling);
        }
        var p2Observer = new MutationObserver(function () { injectP2Button(); });
        p2Observer.observe(document.getElementById("root"), { childList: true, subtree: true });
        setTimeout(injectP2Button, 1500);

        // ===== 예측 구간 시각 구분 =====
        // solsystem 모드에서 현재 보고 있는 테이블의 슈에 예측값이 포함되면
        // (1) 상단에 예측 안내 배지 표시, (2) 큰길(bead road) 그리드에서 예측 구간 셀을 보라색 점선 테두리로 표시
        var predStyle = document.createElement("style");
        predStyle.textContent =
          ".p2-pred-cell{outline:2px dashed #a78bfa !important;outline-offset:-2px;border-radius:9999px;opacity:0.85;}" +
          "#p2-pred-badge{display:none;position:fixed;bottom:52px;left:16px;z-index:99998;background:rgba(124,58,237,.92);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}";
        document.head.appendChild(predStyle);
        var predBadge = document.createElement("div");
        predBadge.id = "p2-pred-badge";
        document.body.appendChild(predBadge);

        function markPredictionCells() {
          try {
            if (!usePhocoa2 || !window.__p2Predictions) {
              predBadge.style.display = "none";
              return;
            }
            // Phocoa 데이터 화면이 아니면 (에볼루션/수동입력) 예측 표시 없음
            var onPhocoaView = false;
            var pvBtns = document.querySelectorAll("button");
            for (var pv = 0; pv < pvBtns.length; pv++) {
              if ((pvBtns[pv].textContent || "").indexOf("스피드") === 0) { onPhocoaView = true; break; }
            }
            if (!onPhocoaView) { predBadge.style.display = "none"; return; }
            // 현재 테이블 이름: h1 제목 "스피드 bbb 1 - 3매 패턴 분석"에서 추출
            var h1 = document.querySelector("h1");
            if (!h1) { predBadge.style.display = "none"; return; }
            var title = h1.textContent || "";
            var tableName = title.split(" - ")[0].trim();
            // 예측 정보는 원본 테이블명("스피드 바카라 1") 기준이므로 화면 치환명("스피드 bbb 1")을 역매핑
            var pred = null;
            for (var key in window.__p2Predictions) {
              var displayKey = key.replace(/바카라/g, "bbb").replace(/Baccarat/gi, "bbb");
              if (displayKey === tableName) { pred = window.__p2Predictions[key]; break; }
            }
            // 이전 표시 제거
            var oldCells = document.querySelectorAll(".p2-pred-cell");
            for (var oc = 0; oc < oldCells.length; oc++) oldCells[oc].classList.remove("p2-pred-cell");
            if (!pred) { predBadge.style.display = "none"; return; }
            var predCount = pred.total - pred.from;
            predBadge.textContent = "🔮 예측 구간 포함: 마지막 " + predCount + "판은 알고리즘 예측값입니다 (실제 결과 아님)";
            predBadge.style.display = "block";
            // 큰길 그리드에서 P/B/T 셀을 순서대로 찾아 마지막 predCount개에 표시
            // 구조: 테이블 행 그리드 안의 원형 셀 (텍스트가 정확히 P/B/T인 span/div)
            var allCells = [];
            var candidates = document.querySelectorAll("#root div, #root span");
            for (var ci = 0; ci < candidates.length; ci++) {
              var el = candidates[ci];
              var t = (el.textContent || "").trim();
              if ((t === "P" || t === "B" || t === "T") && el.children.length === 0) {
                var st = getComputedStyle(el);
                // 원형(라운드) 결과 셀만 (표 헤더 등 제외)
                if (st.borderRadius && st.borderRadius !== "0px") allCells.push(el);
              }
            }
            // DOM 순서 = 슈 순서로 배치되므로 마지막 predCount개를 예측 구간으로 표시
            for (var mi = Math.max(0, allCells.length - predCount); mi < allCells.length; mi++) {
              allCells[mi].classList.add("p2-pred-cell");
            }
          } catch (e) {}
        }
        setInterval(markPredictionCells, 2000);

        // ===== 연승 가능성 알림 (qqq 전용) =====
        // 서버가 세션 계정을 확인해 qqq일 때만 후보를 반환하므로
        // 다른 계정에서는 패널 자체가 나타나지 않는다.
        var streakStyle = document.createElement("style");
        streakStyle.textContent =
          "#streak-alert-panel{display:none;margin:8px 0;background:rgba(15,15,40,.96);border:1px solid #eab308;border-radius:10px;padding:10px 14px;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.5);}" +
          "#streak-alert-panel.sa-floating{position:fixed;top:60px;right:16px;z-index:99996;width:300px;margin:0;}" +
          "#streak-alert-panel h4{margin:0 0 8px;font-size:13px;color:#fbbf24;}" +
          "#streak-alert-panel .sa-item{padding:6px 8px;margin-bottom:6px;background:rgba(234,179,8,.08);border-radius:6px;font-size:12px;color:#e5e7eb;line-height:1.5;}" +
          "#streak-alert-panel .sa-prime{padding:8px 10px;margin-bottom:8px;background:rgba(52,211,153,.12);border:1px solid #34d399;border-radius:8px;font-size:12px;color:#e5e7eb;line-height:1.6;}" +
          "#streak-alert-panel .sa-prime .sa-prime-title{color:#34d399;font-weight:700;font-size:13px;}" +
          "#streak-alert-panel .sa-confirm{padding:8px 10px;margin-bottom:8px;background:rgba(52,211,153,.18);border:2px solid #10b981;border-radius:8px;font-size:12px;color:#fff;line-height:1.6;}" +
          "#streak-alert-panel .sa-confirm .sa-c-title{color:#34d399;font-weight:700;font-size:13px;}" +
          "#streak-alert-panel .sa-watch{padding:7px 9px;margin-bottom:6px;background:rgba(96,165,250,.10);border:1px dashed #60a5fa;border-radius:8px;font-size:12px;color:#dbeafe;line-height:1.55;}" +
          "#streak-alert-panel .sa-watch .sa-w-title{color:#60a5fa;font-weight:700;}" +
          "#streak-alert-panel .sa-ended{padding:7px 9px;margin-bottom:6px;background:rgba(248,113,113,.10);border:1px solid #f87171;border-radius:8px;font-size:12px;color:#fecaca;line-height:1.55;}" +
          "#streak-alert-panel .sa-e-title{color:#f87171;font-weight:700;}" +
          "#streak-alert-panel .sa-score{color:#fbbf24;font-weight:700;}" +
          "#streak-alert-panel .sa-pred{font-weight:700;}" +
          "#streak-alert-panel .sa-pred.P{color:#60a5fa;}" +
          "#streak-alert-panel .sa-pred.B{color:#f87171;}";
        document.head.appendChild(streakStyle);
        var streakPanel = document.createElement("div");
        streakPanel.id = "streak-alert-panel";
        streakPanel.className = "sa-floating";
        document.body.appendChild(streakPanel);
        // PHOCOA 테이블조건2 알림 박스 아래로 패널 이동 시도 (없으면 조건1, 그것도 없으면 플로팅 유지)
        function placeStreakPanel() {
          try {
            var anchors = [];
            var divs = document.querySelectorAll("#root div");
            var cond2 = null, cond1 = null;
            for (var i = 0; i < divs.length; i++) {
              var t = divs[i].textContent || "";
              // 조건 박스의 최상위 컨테이너를 찾기 위해 제목 텍스트 포함 + 자식이 있는 블록 선택
              if (t.indexOf("PHOCOA \uD14C\uC774\uBE14\uC870\uAC742") === 0 || t.indexOf("\u26A1PHOCOA \uD14C\uC774\uBE14\uC870\uAC742") !== -1) {}
            }
            // 더 견고한 탐색: 텍스트에 "테이블조건2 충족"을 포함하는 가장 바깥 박스
            function findBox(marker) {
              var all = document.querySelectorAll("#root div");
              var best = null;
              for (var j = 0; j < all.length; j++) {
                var el = all[j];
                if ((el.textContent || "").indexOf(marker) !== -1) best = el; // 가장 안쪽까지 내려감
              }
              // best는 가장 마지막(안쪽) → 부모로 올라가며 형제가 있는 컨테이너 찾기
              if (!best) return null;
              var node = best;
              while (node && node.parentElement && node.parentElement.id !== "root") {
                if ((node.textContent || "").indexOf(marker) !== -1 && node.parentElement.children.length > 1) {
                  // marker를 포함하는 블록 중 루트 바로 아래 수준에 가까운 것
                }
                node = node.parentElement;
                if (node.parentElement && node.parentElement.id === "root") break;
              }
              // 실용적 접근: marker 포함 요소 중 클래스에 rounded/border가 있는 가장 바깥 박스
              var candidates = [];
              for (var k = 0; k < all.length; k++) {
                var e2 = all[k];
                if ((e2.textContent || "").indexOf(marker) !== -1) {
                  var cls = (e2.className || "").toString();
                  if (cls.indexOf("rounded") !== -1 || cls.indexOf("border") !== -1) candidates.push(e2);
                }
              }
              return candidates.length ? candidates[0] : null;
            }
            var box2 = findBox("\uD14C\uC774\uBE14\uC870\uAC742 \uCDA9\uC871");
            var box1 = findBox("\uD14C\uC774\uBE14 \uC870\uAC74 \uCDA9\uC871");
            var anchor = box2 || box1;
            if (anchor && anchor.parentElement && streakPanel.previousElementSibling !== anchor) {
              anchor.parentElement.insertBefore(streakPanel, anchor.nextSibling);
              streakPanel.classList.remove("sa-floating");
            } else if (!anchor && !document.body.contains(streakPanel)) {
              document.body.appendChild(streakPanel);
              streakPanel.classList.add("sa-floating");
            }
          } catch (e) {}
        }
        placeStreakPanel();
        setInterval(placeStreakPanel, 2000);
        var lastCandidateKeys = "";
        function predHtml(p) {
          return p ? " → \uC608\uCE21: <span class='sa-pred " + p + "'>" + (p === "P" ? "P(\uD50C\uB808\uC774\uC5B4)" : "B(\uBC45\uCEE4)") + "</span>" : "";
        }
        function renderStreakAlerts(watching, confirmed, ended, stats) {
          var hasAny = (watching && watching.length) || (confirmed && confirmed.length) || (ended && ended.length);
          if (!hasAny) {
            streakPanel.style.display = "none";
            lastCandidateKeys = "";
            return;
          }
          var html = "";
          function dispNm(nm) { return (nm || "").replace(/바카라/g, "bbb").replace(/Baccarat/gi, "bbb"); }
          var keys = [];
          // 3연승 도달률 통계 헤더
          if (stats && stats.confirmedTotal > 0) {
            html += "<div style='font-size:11px;color:#9ca3af;margin-bottom:6px;'>" +
              "\uD83D\uDCCA 3\uC5F0\uC2B9 \uB3C4\uB2EC\uB960: <b style='color:#fbbf24'>" + stats.reachRate + "%</b>" +
              " (\uD655\uC815 " + stats.confirmedTotal + "\uAC74 \uC911 " + stats.reached3 + "\uAC74 \uB3C4\uB2EC)" +
              "</div>";
          }
          // 확정 후보 (첫 게임 O 적중 완료) - 최상단 강조
          if (confirmed && confirmed.length) {
            for (var ci2 = 0; ci2 < confirmed.length; ci2++) {
              var cf = confirmed[ci2];
              keys.push("CONFIRM:" + cf.key);
              html += "<div class='sa-confirm'>" +
                "<div class='sa-c-title'>\u2705 \uD655\uC815 \uD6C4\uBCF4 — \uCCAB\uC9F8 \uD310 O\uB85C \uC2B9\uB9AC</div>" +
                "<b>" + dispNm(cf.tableNm) + "</b> — \uD328\uD134 " + cf.pattern +
                " <span class='sa-score'>\uACB0\uD569 " + cf.combinedScore + "\uC810</span><br>" +
                (cf.currentRounds ? "\uD604\uC7AC \uD310\uC218 " + cf.currentRounds + "\uD310 · " : "") +
                (cf.overallHitRate ? "\uD655\uB960 " + cf.overallHitRate + "% · " : "") +
                (cf.recentHitRate ? "\uCD5C\uADFC \uC801\uC911 " + cf.recentHitRate + "% · " : "") +
                "\uD655\uC815 \uD6C4 " + (cf.winsSinceConfirm || 1) + "\uC5F0\uC2B9 \uC9C4\uD589 \uC911" +
                predHtml(cf.nextPrediction) +
                "</div>";
            }
          }
          // 관찰 중 후보 (결합 90점 이상, 다음 판 대기)
          if (watching && watching.length) {
            for (var wi = 0; wi < watching.length; wi++) {
              var w = watching[wi];
              keys.push("WATCH:" + w.key);
              html += "<div class='sa-watch'>" +
                "<span class='sa-w-title'>\u23F3 \uAD00\uCC30 \uC911</span> " +
                "<b>" + dispNm(w.tableNm) + "</b> — \uD328\uD134 " + w.pattern +
                " <span class='sa-score'>\uACB0\uD569 " + w.combinedScore + "\uC810</span><br>" +
                (w.currentRounds ? "\uD604\uC7AC \uD310\uC218 " + w.currentRounds + "\uD310 · " : "") +
                (w.overallHitRate ? "\uD655\uB960 " + w.overallHitRate + "% · " : "") +
                (w.recentHitRate ? "\uCD5C\uADFC \uC801\uC911 " + w.recentHitRate + "% · " : "") +
                "\uCCAB\uC9F8 \uD310 O(\uC2B9\uB9AC) \uC2DC \uD655\uC815" +
                predHtml(w.nextPrediction) +
                "</div>";
            }
          }
          // 종료된 후보 (X 패배로 해제됨) - 1분간 결과 표시
          if (ended && ended.length) {
            for (var ei = 0; ei < ended.length; ei++) {
              var e = ended[ei];
              html += "<div class='sa-ended'>" +
                "<span class='sa-e-title'>\u274C \uC885\uB8CC</span> " +
                "<b>" + dispNm(e.tableNm) + "</b> — \uD328\uD134 " + e.pattern +
                "<br>" + (e.currentRounds ? "\uD604\uC7AC \uD310\uC218 " + e.currentRounds + "\uD310 · " : "") +
                "\uD655\uC815 \uD6C4 " + (e.finalWins || 0) + "\uC5F0\uC2B9 \uD6C4 X \uD328\uBC30\uB85C \uD574\uC81C\uB428" +
                "</div>";
            }
          }
          streakPanel.innerHTML = html;
          streakPanel.style.display = "block";
          placeStreakPanel(); // 표시 직후 인라인 위치 재적용 (React 리렌더 대응)
          // 새 후보 조합이 나타나면 알림음 (기존 오디오 컨텍스트 재활용 시도)
          var keyStr = keys.join(",");
          if (keyStr !== lastCandidateKeys && lastCandidateKeys !== "") {
            try {
              var ctx = new (window.AudioContext || window.webkitAudioContext)();
              var osc = ctx.createOscillator();
              var gain = ctx.createGain();
              osc.connect(gain); gain.connect(ctx.destination);
              osc.frequency.value = 880;
              gain.gain.setValueAtTime(0.12, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
              osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch (e) {}
          }
          lastCandidateKeys = keyStr;
        }
        async function pollStreakAlerts() {
          // 사용자 요청으로 2단계 알림 표시 차단됨 (재활성화: 아래 return 제거)
          streakPanel.style.display = "none";
          return;
          try {
            var res = await fetch("/api/streak-alerts", { credentials: "include" });
            if (!res.ok) return;
            var d = await res.json();
            if (!d.enabled) { streakPanel.style.display = "none"; return; }
            renderStreakAlerts(d.watching, d.confirmed, d.ended, d.stats);
          } catch (e) {}
        }
        pollStreakAlerts();
        setInterval(pollStreakAlerts, 10000);

        var freshEl = document.getElementById("feed-freshness");
        var alertEl = document.getElementById("feed-alert");
        var failCount = 0;
        // 브라우저 측 밀림 감지: 데이터 내용 지문이 일정 시간 변하지 않으면 경고
        // (서버리스 재기동으로 서버측 ageMs가 리셋되어도 신뢰 가능)
        // Phocoa와 CasinoScores(baccarat.getResults) 응답을 각각 추적한다.
        var fpMap = {};       // source -> fingerprint
        var changeMap = {};   // source -> lastChangeAt
        var STUCK_LIMIT_MS = 45000; // 45초간 데이터 무변화 시 밀림으로 판단
        function trackBody(source, body) {
          var fp = body.length + ":" + body.slice(0, 800);
          if (fpMap[source] !== fp) {
            fpMap[source] = fp;
            changeMap[source] = Date.now();
          }
        }
        function sourceFor(url) {
          if (url.indexOf("/api/phocoa/3matrix4") !== -1) return "phocoa";
          if (url.indexOf("baccarat.getResults") !== -1) return "casinoscores";
          return null;
        }
        var origFetch = window.fetch.bind(window);
        window.fetch = async function (input, init) {
          var res = await origFetch(input, init);
          try {
            var url = typeof input === "string" ? input : (input && input.url) || "";
            var source = sourceFor(url);
            if (source && res.ok) {
              res.clone().text().then(function (body) { trackBody(source, body); }).catch(function () {});
            }
          } catch (e) {}
          return res;
        };
        function stuckInfo() {
          // 추적된 소스 중 활성(1회 이상 수신) 소스만 검사
          var now = Date.now();
          var stuck = [];
          var maxAge = 0;
          for (var src in changeMap) {
            var age = now - changeMap[src];
            if (age > maxAge) maxAge = age;
            if (age > STUCK_LIMIT_MS) stuck.push(src === "phocoa" ? "Phocoa" : "Evolution");
          }
          // 배너는 Phocoa 무변화만 대상으로 한다 (Evolution 제외)
          var phocoaStuck = changeMap.phocoa !== undefined && now - changeMap.phocoa > STUCK_LIMIT_MS;
          var phocoaAge = changeMap.phocoa !== undefined ? now - changeMap.phocoa : -1;
          return { stuck: stuck, maxAge: maxAge, tracked: Object.keys(changeMap).length > 0, phocoaStuck: phocoaStuck, phocoaAge: phocoaAge };
        }
        function showBanner(msg) {
          alertEl.textContent = msg;
          alertEl.style.display = "block";
        }
        function hideBanner() {
          alertEl.style.display = "none";
        }
        function fmtAge(ms) {
          if (ms < 0) return "수신 전";
          if (ms < 1000) return "방금";
          var s = Math.floor(ms / 1000);
          if (s < 60) return s + "초 전";
          var m = Math.floor(s / 60);
          return m + "분 " + (s % 60) + "초 전";
        }
        async function poll() {
          var si = stuckInfo();
          var dataStuck = si.phocoaStuck; // 배너 판정은 Phocoa만
          try {
            var res = await fetch("/api/feeds/status", { credentials: "include" });
            if (!res.ok) throw new Error("status " + res.status);
            var d = await res.json();
            failCount = 0;
            freshEl.innerHTML =
              "Phocoa 갱신: <b style='color:" + (d.phocoa.stale ? "#f87171" : "#34d399") + "'>" + fmtAge(d.phocoa.ageMs) + "</b>" +
              " &nbsp;|&nbsp; Evolution 갱신: <b style='color:" + (d.casinoscores.stale ? "#f87171" : "#34d399") + "'>" + fmtAge(d.casinoscores.ageMs) + "</b>" +
              (si.tracked ? " &nbsp;|&nbsp; 결과변화: <b style='color:" + (dataStuck ? "#f87171" : "#34d399") + "'>" + fmtAge(si.maxAge) + "</b>" : "");
            // 배너는 Phocoa 관련 문제만 표시 (Evolution 제외)
            var problems = [];
            if (d.phocoa.stale) problems.push("Phocoa");
            if (dataStuck) problems.push("Phocoa 결과 데이터 무변화 " + Math.floor(si.phocoaAge / 1000) + "초");
            if (problems.length > 0) {
              showBanner("⚠️ " + problems.join(", ") + " 데이터 수신이 지연되고 있습니다. 외부 API 장애일 수 있으며 자동으로 재시도 중입니다.");
            } else {
              hideBanner();
            }
          } catch (e) {
            failCount++;
            freshEl.textContent = "데이터 상태 확인 실패 (서버 연결 오류)";
            if (failCount >= 2 || dataStuck) {
              showBanner("⚠️ 서버 연결이 원활하지 않습니다. 네트워크 상태를 확인해주세요. (자동 재시도 중)");
            }
          }
        }
        poll();
        setInterval(poll, 5000);
      })();
    </script>
  </body>

</html>
